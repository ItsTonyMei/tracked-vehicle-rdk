; ============================================================================
; 履带车视觉跟随系统 — STM32F103RCT6 L1 执行与安全层
; Yahboom ROS Robot Control Board V3.0
; MCU: STM32F103RCT6 (Cortex-M3, 72MHz, 256KB Flash, 48KB SRAM)
; ============================================================================

[env:genericSTM32F103RC]
platform = ststm32
board = genericSTM32F103RC
framework = arduino

; ─── 上传配置 (CH340N Micro USB → USART1 PA9/PA10) ───
; V3.0 板的 CH340N DTR/RTS 未连接到 NRST/BOOT0, 不支持自动下载
; 烧录前需手动: 按住 BOOT0 → 按 RESET → 松 BOOT0 → 执行上传
; COM port: change to match your system (COM5 on Windows, /dev/ttyUSB0 on Linux)
upload_protocol = serial
upload_port = COM5
upload_speed = 115200
upload_flags =
    -b
    115200
    -i
    ,,,,,,,,,,

; ─── 串口监控 ───
monitor_port = COM5
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; ─── 编译选项 ───
build_flags =
    -D HAL_UART_MODULE_ENABLED
